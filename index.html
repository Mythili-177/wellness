<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellScore+ Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e0f2fe;
  text-align: center;
}
.container {
  background: rgba(15, 23, 42, 0.9);
  padding: 30px;
  border-radius: 20px;
  width: 420px;
  margin: 40px auto;
  box-shadow: 0 0 30px rgba(56,189,248,0.4);
  border: 1px solid rgba(56,189,248,0.3);
}
h1 {
  color: #38bdf8;
  text-shadow: 0 0 10px #38bdf8;
}
.question {
  margin: 15px 0;
  text-align: left;
}
select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  background: #020617;
  color: #e0f2fe;
  border: 1px solid #38bdf8;
}
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px #38bdf8;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #38bdf8;
}
.card {
  background: rgba(2,6,23,0.8);
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(56,189,248,0.3);
  box-shadow: 0 0 10px rgba(56,189,248,0.2);
}
canvas {
  margin-top: 20px;
}
</style>
</head>
<body>
<h1>WellScore+ Quiz</h1>
<div class="container">

<div class="question">
  Sleep hours?
  <select id="sleep">
    <option value="4">Less than 5</option>
    <option value="6">5-6</option>
    <option value="8">7-8</option>
  </select>
</div>

<div class="question">
  Stress level?
  <select id="stress">
    <option value="8">High</option>
    <option value="5">Medium</option>
    <option value="2">Low</option>
  </select>
</div>

<div class="question">
  Screen time?
  <select id="screen">
    <option value="8">More than 6 hrs</option>
    <option value="5">3-6 hrs</option>
    <option value="2">Less than 3 hrs</option>
  </select>
</div>

<div class="question">
  Study balance?
  <select id="study">
    <option value="3">Overworked</option>
    <option value="6">Balanced</option>
    <option value="8">Relaxed</option>
  </select>
</div>

<button onclick="calculateScore()">Get My Score</button>

<div id="result"></div>
<canvas id="chart"></canvas>

</div>

<script>
let scores = [];

function calculateScore(){
  let sleep = parseInt(document.getElementById('sleep').value);
  let stress = parseInt(document.getElementById('stress').value);
  let screen = parseInt(document.getElementById('screen').value);
  let study = parseInt(document.getElementById('study').value);

  let total = (sleep + (10-stress) + (10-screen/2) + study)/4;
  scores.push(total);

  let risk = "Low";
  if(total < 4) risk = "High";
  else if(total < 7) risk = "Medium";

  let advice = "";
  if(sleep < 6) advice += "Sleep more. ";
  if(stress > 6) advice += "Reduce stress. ";
  if(screen > 6) advice += "Cut screen time. ";

  document.getElementById('result').innerHTML = `
    <div class="card">Score: ${total.toFixed(2)}</div>
    <div class="card">Burnout Risk: ${risk}</div>
    <div class="card">Advice: ${advice}</div>
  `;

  renderChart();
}

function renderChart(){
  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: scores.map((_, i) => "Attempt " + (i+1)),
      datasets: [{
        label: 'Score Trend',
        data: scores,
        borderColor: '#38bdf8',
        backgroundColor: 'rgba(56,189,248,0.2)'
      }]
    }
  });
}
</script>

</body>
</html>
